<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#23234a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <radialGradient id="speaker" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2e2e54"/>
      <stop offset="100%" stop-color="#0e0e1e"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff8c0"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#a07010"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Outer speaker ring -->
  <circle cx="15" cy="17" r="12" fill="url(#speaker)" stroke="#f0c040" stroke-width="1.5"/>

  <!-- Speaker grille rings -->
  <circle cx="15" cy="17" r="9"  fill="none" stroke="#f0c040" stroke-width="1"   opacity="0.5"/>
  <circle cx="15" cy="17" r="6"  fill="none" stroke="#f0c040" stroke-width="0.9" opacity="0.4"/>
  <circle cx="15" cy="17" r="3"  fill="none" stroke="#f0c040" stroke-width="0.8" opacity="0.35"/>

  <!-- Center hub -->
  <circle cx="15" cy="17" r="1.5" fill="#f0c040" opacity="0.8"/>

  <!-- Gold achievement star (top-right) -->
  <g transform="translate(24.5, 8)">
    <path d="M0,-5.5 L1.3,-2 L5,-2 L2.1,0.2 L3.3,4 L0,2 L-3.3,4 L-2.1,0.2 L-5,-2 L-1.3,-2 Z"
          fill="url(#star)" stroke="#8a6008" stroke-width="0.4"/>
  </g>
</svg>
