target-version = "py311"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter
    "SIM108", # use ternary — not always clearer
]

[lint.per-file-ignores]
"tests/*" = ["B", "SIM"]
"finetune.py" = ["E", "W", "B", "SIM"]  # experimental script, not production

[format]
quote-style = "double"
indent-style = "space"
